<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>電車ダッシュボード</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, system-ui; margin: 10px; background: #f5f5f5; }
    .card { background: white; padding: 12px; margin-bottom: 12px; border-radius: 8px; }
    .title { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
    .time { font-size: 28px; font-weight: bold; }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 8px; margin-right: 4px; font-size: 12px; }
    .walk { background: #e0f7fa; }
    .bus { background: #ffe0b2; }
    .highlight { background: #e8f5e9; padding: 8px; border-radius: 8px; }
  </style>
</head>
<body>

  <div class="card">
    <div class="title">🚃 電車ダッシュボード</div>
    <div>現在時刻</div>
    <div id="now" class="time"></div>
  </div>

  <div class="card">
    <div class="title">次に乗れる候補</div>
    <div id="next"></div>
  </div>

  <div class="card">
    <div class="title">ダイヤ一覧（近い順）</div>
    <div id="list"></div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
